name: Jules Maintenance

on:
  issues:
    types: [ labeled, edited ]
  issue_comment:
    types: [ created, edited ]

jobs:
  jules:
    runs-on: ubuntu-latest
    # Only run if the 'Jules' label is present or @google-jules is called
    if: >
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'Jules')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@google-jules'))
    steps:
      - name: Invoke Jules
        uses: google-labs-code/jules-invoke@v1
        with:
          jules-api-key: ${{ secrets.JULES_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
